site_name: CodeGraphContext
repo_url: https://github.com/CodeGraphContext/CodeGraphContext
repo_name: CodeGraphContext/CodeGraphContext
theme:
  name: material
  logo: images/cgcIcon.png
  favicon: images/cgcIcon.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.follow
  palette: 
    - scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Introduction: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - MCP Setup: getting-started/mcp-setup.md
  - Core Concepts:
    - The Code Graph: concepts/graph-model.md
    - Database Backends: concepts/backends.md
    - System Architecture: concepts/architecture.md
  - User Guides:
    - Indexing Source Code: guides/indexing.md
    - Portable Bundles: guides/bundles.md
    - Multi-Repo Workflows: guides/multi-repo.md
    - Visualization: guides/visualization.md
  - Reference:
    - CLI Reference: reference/cli.md
    - MCP Tool Reference: reference/mcp.md
    - Configuration: reference/config.md
  - Community:
    - Contributing: contributing.md
    - Troubleshooting: reference/troubleshooting.md
    - Roadmap: roadmap.md
    - License: license.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true 
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg